<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM-HCM-01 · Chọn đồ</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-3">
    <div class="container-fluid" style="max-width: 600px">
      <div class="card shadow">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center small py-2"
        >
          <div id="header-left" class="fw-bold">VM-HCM-01 - Đang tải...</div>
          <div id="header-right" class="fw-bold">--:--</div>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0">Chọn đồ uống</h5>
            <button
              class="btn btn-primary btn-sm shadow-sm"
              id="createOrderBtn"
              onclick="createOrder()"
              disabled
            >
              <i class="bi bi-cart-check"></i> <span id="cartTotalTop">0đ</span>
            </button>
          </div>
          <div class="row row-cols-2 g-2" id="productGrid"></div>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="./js/product.js"></script>
    <script src="./js/layout/header.js"></script>
  </body>
</html>
