<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM-HCM-01 · Thanh toán</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light p-3">
    <div class="container-fluid" style="max-width: 600px">
      <div class="card shadow">
        <div
          class="card-header bg-dark text-white d-flex justify-content-between align-items-center small py-2"
        >
          <div id="header-left" class="fw-bold">VM-HCM-01 - Sẵn sàng</div>
          <div id="header-right" class="fw-bold">--:--</div>
        </div>

        <div class="card-body">
          <h1 class="h4 mb-3">Quét mã thanh toán</h1>

          <div class="card bg-light border-0 mb-3">
            <div class="card-body">
              <h6 class="fw-bold">
                Đơn hàng <span id="orderCodeLabel">#---</span>
              </h6>
              <div id="orderItemsList"></div>
              <div
                class="border-top mt-2 pt-2 fw-bold d-flex justify-content-between"
              >
                <span>Tổng cộng</span>
                <span id="orderTotalLabel" class="text-primary">0đ</span>
              </div>
            </div>
          </div>

          <div class="card border-primary p-3 text-center">
            <div class="display-1 text-primary">
              <i class="bi bi-qr-code"></i>
            </div>
            <div class="h4 fw-bold my-2" id="qrAmountLabel">0đ</div>
            <p class="text-muted small">
              Mã hết hạn sau:
              <span id="qrCountdown" class="text-danger fw-bold">05:00</span>
            </p>
            <button
              class="btn btn-primary btn-lg mt-3"
              onclick="confirmPayment()"
            >
              Tôi đã thanh toán
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/payment.js"></script>
    <script src="./js/layout/header.js"></script>
  </body>
</html>
