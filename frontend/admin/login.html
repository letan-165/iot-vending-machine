<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Vending Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body class="login-body" data-page="login">
  <div class="card login-card">
    <div class="card-body p-4 p-md-5">
      <div class="login-logo mb-4"><i class="bi bi-cup-hot"></i></div>
      <h1 class="h3 fw-bold mb-2">Đăng nhập Admin</h1>
      <p class="text-muted mb-4">Hệ thống quản trị máy bán nước tự động.</p>

      <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control form-control-lg" id="username" value="admin" autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control form-control-lg" id="password" value="123456" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
        </button>
      </form>

      <div class="mt-4 p-3 bg-light rounded-4 small text-muted">
        Tài khoản demo: <strong>admin</strong> / <strong>123456</strong><br>
        Role được phép vào: <strong>ADMIN</strong>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
