<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Management | Vending Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-page="orders">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 class="page-title">Order Management</h1>
          <p class="page-subtitle">Xem danh sách đơn hàng theo trạng thái hiện tại từ API.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap"></div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 class="h5 fw-bold mb-1">Danh sách đơn hàng</h2>
            <div class="text-muted small">Trạng thái: PENDING, PAID, COMPLETED, CANCELLED.</div>
          </div>
        </div>
        <div id="ordersTable" class="panel-body"></div>
      </section>

      <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content rounded-4">
            <div class="modal-header">
              <h5 class="modal-title fw-bold">Chi tiết đơn hàng</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div id="orderDetailBody" class="modal-body"></div>
            <div class="modal-footer">
              <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Đã hiểu</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/auth-guard.js"></script>
  <script type="module" src="./js/orders.js"></script>
</body>
</html>
