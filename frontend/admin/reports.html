<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report & Statistics | Vending Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-page="reports">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 class="page-title">Report & Statistics</h1>
          <p class="page-subtitle">Báo cáo doanh thu, đơn hàng và sản phẩm bán chạy dành cho Admin.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap"></div>
      </div>

      
      <div id="reportStats" class="row g-3 mb-4"></div>

      <div class="row g-4">
        <div class="col-12 col-xl-5">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2 class="h5 fw-bold mb-1">Top Products</h2>
                <div class="text-muted small">Sản phẩm bán chạy nhất.</div>
              </div>
            </div>
            <div id="topProducts" class="panel-body"></div>
          </section>
        </div>
        <div class="col-12 col-xl-7">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2 class="h5 fw-bold mb-1">Revenue Detail</h2>
                <div class="text-muted small">Nguồn dữ liệu từ Order + Payment.</div>
              </div>
            </div>
            <div id="revenueTable" class="panel-body"></div>
          </section>
        </div>
      </div>
    
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
