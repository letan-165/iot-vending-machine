<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Machine Management | Vending Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-page="machines">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 class="page-title">Machine Management</h1>
          <p class="page-subtitle">Theo dõi và cập nhật trạng thái máy bán nước: Active, Maintenance, Offline.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap"></div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 class="h5 fw-bold mb-1">Danh sách máy bán nước</h2>
            <div class="text-muted small">Cập nhật trạng thái hoạt động theo API PUT /status.</div>
          </div>
        </div>
        <div id="machinesTable" class="panel-body"></div>
      </section>

      <div class="modal fade" id="machineModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content rounded-4">
            <div class="modal-header">
              <h5 id="machineModalTitle" class="modal-title fw-bold">Sửa máy</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="machineId">
              <div class="mb-3">
                <label for="machineLocation" class="form-label">Vị trí</label>
                <input id="machineLocation" class="form-control" placeholder="Sảnh chính">
              </div>
              <div class="mb-3">
                <label for="machineStatus" class="form-label">Trạng thái</label>
                <select id="machineStatus" class="form-select">
                  <option value="ACTIVE">ACTIVE</option>
                  <option value="MAINTENANCE">MAINTENANCE</option>
                  <option value="OFFLINE">OFFLINE</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
              <button type="button" class="btn btn-primary" onclick="submitMachineForm()">Lưu máy</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/auth-guard.js"></script>
  <script type="module" src="./js/machines.js"></script>
</body>
</html>
