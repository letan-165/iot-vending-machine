<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Admin | Vending Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 class="page-title">Dashboard Admin</h1>
          <p class="page-subtitle">Theo dõi doanh thu, đơn hàng, tồn kho và trạng thái máy bán nước.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap"></div>
      </div>

      
      <div id="dashboardStats" class="row g-3 mb-4"></div>

      <div class="row g-4">
        <div class="col-12 col-xl-7">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2 class="h5 fw-bold mb-1">Đơn hàng gần đây</h2>
                <div class="text-muted small">Dữ liệu lấy theo Order + Payment trong sequence.</div>
              </div>
              <a href="orders.html" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
            </div>
            <div id="recentOrders" class="panel-body"></div>
          </section>
        </div>
        <div class="col-12 col-xl-5">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2 class="h5 fw-bold mb-1">Trạng thái máy</h2>
                <div class="text-muted small">ACTIVE / MAINTENANCE / OFFLINE.</div>
              </div>
              <a href="machines.html" class="btn btn-sm btn-outline-primary">Quản lý</a>
            </div>
            <div id="machineSummary" class="panel-body"></div>
          </section>
        </div>
      </div>
    
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
