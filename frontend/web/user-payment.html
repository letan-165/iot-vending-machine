<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Payment | Vending</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body class="payment-body">
  <main class="payment-shell">
    <section class="payment-card card">
      <div class="card-body p-4 p-md-5 text-center">
        <div id="paymentAlert" class="alert d-none text-start" role="alert"></div>

        <div id="paymentAmountText" class="payment-amount-text mb-4">
          Số tiền cần thanh toán: -- VND
        </div>

        <div class="payment-actions d-grid gap-2">
          <button id="paidButton" type="button" class="btn btn-success btn-lg">
            <i class="bi bi-check-circle me-1"></i> Thanh toán thành công
          </button>
          <button id="cancelButton" type="button" class="btn btn-danger btn-lg">
            <i class="bi bi-x-circle me-1"></i> Thanh toán thất bại
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./assets/js/user-payment.js"></script>
</body>
</html>
