<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Khởi động | Vending Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="./assets/css/style.css" rel="stylesheet" />
  </head>

  <body class="login-body">
    <div class="card login-card">
      <div class="card-body p-4 p-md-5 text-center">
        <div class="login-logo mb-4">
          <i class="bi bi-cup-hot"></i>
        </div>

        <h1 class="h3 fw-bold mb-3">Đang khởi động hệ thống</h1>

        <p class="text-muted mb-4">
          Máy chủ đang được đánh thức.<br />
          Quá trình này có thể mất khoảng <strong>30 - 60 giây</strong>.
        </p>

        <div
          class="spinner-border text-primary mb-4"
          style="width: 3rem; height: 3rem"
          role="status"
        >
          <span class="visually-hidden">Loading...</span>
        </div>

        <div class="progress mb-3" style="height: 8px">
          <div
            class="progress-bar progress-bar-striped progress-bar-animated"
            style="width: 100%"
          ></div>
        </div>

        <small id="statusText" class="text-secondary">
          Đang kết nối đến máy chủ...
        </small>
      </div>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
