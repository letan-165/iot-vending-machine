<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Management | Vending Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>

<body data-page="products">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 class="page-title">Product Management</h1>
          <p class="page-subtitle">Quản lý sản phẩm và chuẩn bị kết nối API.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap"></div>
      </div>



      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 class="h5 fw-bold mb-1">Danh sách sản phẩm</h2>
            <div class="text-muted small">Thuộc tính: id, name, price, image, status.</div>
          </div>

          <button class="btn btn-primary" onclick="openProductModal()">
            <i class="bi bi-plus-circle me-1"></i> Thêm sản phẩm
          </button>
        </div>

        <div id="productsTable" class="panel-body"></div>
      </section>

      <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content rounded-4">
            <div class="modal-header">
              <h5 id="productModalTitle" class="modal-title fw-bold">Thêm sản phẩm</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
              <input type="hidden" id="productId">

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="productName">Tên sản phẩm</label>
                  <input id="productName" class="form-control" placeholder="Ví dụ: Coca Cola">
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="productPrice">Giá bán</label>
                  <input id="productPrice" type="number" min="0" class="form-control" placeholder="10000">
                </div>

                <div class="col-md-8">
                  <label class="form-label" for="productImage">Ảnh sản phẩm URL</label>
                  <input id="productImage" class="form-control" placeholder="https://...">
                </div>

                <div class="col-md-4">
                  <label class="form-label" for="productStatus">Trạng thái</label>
                  <select id="productStatus" class="form-select">
                    <option value="AVAILABLE">AVAILABLE</option>
                    <option value="OUT_OF_STOCK">OUT_OF_STOCK</option>
                    <option value="DISABLED">DISABLED</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
              <button type="button" class="btn btn-primary" onclick="submitProductForm()">Lưu sản phẩm</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/auth-guard.js"></script>
  <script type="module" src="./js/products.js"></script>
</body>
</html>
