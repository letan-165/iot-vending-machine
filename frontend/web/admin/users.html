<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management | Vending Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-page="users">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <div class="topbar">
        <div>
          <h1 class="page-title">User Management</h1>
          <p class="page-subtitle">Quản lý tài khoản người dùng: xem danh sách, thêm mới và chỉnh sửa thông tin.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap"></div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 class="h5 fw-bold mb-1">Danh sách tài khoản</h2>
            <div class="text-muted small">Hiển thị id, username, full name, email và role.</div>
          </div>
          <button class="btn btn-primary" onclick="openUserModal()">
            <i class="bi bi-person-plus me-1"></i> Thêm mới
          </button>
        </div>
        <div id="usersTable" class="panel-body"></div>
      </section>

      <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content rounded-4">
            <div class="modal-header">
              <h5 id="userModalTitle" class="modal-title fw-bold">Thêm mới</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="userId">
              <div id="userUsernameGroup" class="mb-3">
                <label for="userUsername" class="form-label">Username</label>
                <input id="userUsername" class="form-control" placeholder="staff03">
              </div>
              <div id="userPasswordGroup" class="mb-3">
                <label for="userPassword" class="form-label">Password</label>
                <input id="userPassword" type="password" class="form-control" placeholder="123456">
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="userFullName" class="form-label">Full name</label>
                  <input id="userFullName" class="form-control" placeholder="Tan Name">
                </div>
                <div class="col-md-6">
                  <label for="userEmail" class="form-label">Email</label>
                  <input id="userEmail" type="email" class="form-control" placeholder="tan@gmail.com">
                </div>
                <div class="col-md-6">
                  <label for="userRole" class="form-label">Role</label>
                  <select id="userRole" class="form-select">
                    <option value="ADMIN">ADMIN</option>
                    <option value="STAFF">STAFF</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
              <button type="button" class="btn btn-primary" onclick="submitUserForm()">Lưu</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/auth-guard.js"></script>
  <script type="module" src="./js/users.js"></script>
</body>
</html>
